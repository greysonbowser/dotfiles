# reload config
bind R source-file ~/.tmux.conf \; display "Config successfully reloaded"

# improve pane splitting to keep path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# increase time to input command after prefix
set -s escape-time 5

# make messages last longer
set -g display-time 4000

# to use prefix + : for tmux commands
set -g status-keys emacs

# remap prefix from C-b to C-a 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# disable automatic naming
set-option -g allow-rename off

# increase buffer
set -g history-limit 50000

# change to 1 based index
set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

# APPEARANCE

set -g status-position top
set -g status-justify left


# PLUGINS
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @rose_pine_user 'on'
set -g @rose_pine_host 'on'
set -g @rose_pine_hostname_short 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%a %b %d %I:%M %p'

# Keep the full Rose Pine status bar visible instead of collapsing to just windows.
set -g @rose_pine_only_windows 'off'
set -g @rose_pine_prioritize_windows 'off'
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_show_pane_directory 'on'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_default_window_behavior 'on'

set -g @rose_pine_window_separator ' - '
set -g @rose_pine_field_separator '  '
set -g status-left-length 100
set -g status-right-length 120

# must be at bottom of file!
run '~/.tmux/plugins/tpm/tpm'
